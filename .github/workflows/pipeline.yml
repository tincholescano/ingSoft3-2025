name: Build and Deploy

on:
  push:
    branches:
      - testing

env:
  PROJECT_ID: ${{ secrets.GOOGLECLOUD_PROJECT }}
  REGION: southamerica-east1
  REPO_NAME: gc-ingsoft3-2025

jobs:
  docker-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ingsoft3-2025:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ingsoft3-2025:latest
      
  deploy-googlecloud:
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GOOGLECLOUD_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v0

      - name: Deploy Backend
        run: |-
          gcloud run deploy gc-ingsoft3-2025 \
          --region $REGION \
          --image gcr.io/$PROJECT_ID/gc-ingsoft3-2025:latest \
          --platform "managed" \
          --quiet

