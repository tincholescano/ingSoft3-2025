name: Build and Deploy

on:
  push:
    branches:
      - testing

env:

  PROJECT_ID: ${{ secrets.GOOGLECLOUD_PROJECT }}
  REGION: southamerica-east1
  REPO_NAME: gc-ingsoft3-2025

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13.1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install selenium

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test

  docker-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ingsoft3-2025:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ingsoft3-2025:latest


  deploy-googlecloud:
    name: Setup, Build, and Deploy
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GOOGLECLOUD_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v0

      - name: Authorize Docker push
        run: gcloud auth configure-docker

      - name: Build and tag the docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |-
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
          docker build -t $DOCKER_USERNAME/ingsoft3-2025:latest .
          docker push $DOCKER_USERNAME/ingsoft3-2025:latest

      - name: Push the image to the Google Container Registry (GCR)
        run: |-
          docker tag martinlescano/ingsoft3-2025:latest gcr.io/neural-mantra-376023/gc-ingsoft3-2025
          docker push gcr.io/neural-mantra-376023/gc-ingsoft3-2025:latest
      
      - name: Deploy Backend
        run: |-
          gcloud run deploy gc-ingsoft3-2025 \
          --region $REGION \
          --image gcr.io/neural-mantra-376023/gc-ingsoft3-2025:latest \
          --command "python" --args "manage.py", "migrate"
          --platform "managed" \
          --quiet
